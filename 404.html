<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page Not Found - NexusEvents">
  <title>404 - Page Not Found</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23ff00c8'/%3E%3Cstop offset='100%25' style='stop-color:%230066ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Cpath d='M30 35h40v5H30zm0 12h40v5H30zm0 12h30v5H30z' fill='white'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      position: relative;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .error-bg {
      position: absolute;
      inset: 0;
      background: var(--gradient-mesh);
      z-index: -1;
    }

    .error-card {
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-2xl);
      padding: var(--space-10) var(--space-8);
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-xl);
      animation: fadeInUp 0.6s ease;
      position: relative;
    }

    .error-code {
      font-size: 8rem;
      font-family: var(--font-display);
      font-weight: var(--fw-extrabold);
      background: linear-gradient(135deg, #ff00a0, #0066ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: var(--space-4);
      filter: drop-shadow(0 0 15px rgba(0, 102, 255, 0.4));
      animation: floatCode 4s ease-in-out infinite;
    }

    @keyframes floatCode {
      0% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-12px) rotate(1.5deg);
      }

      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    .error-title {
      font-size: var(--fs-3xl);
      font-weight: var(--fw-bold);
      margin-bottom: var(--space-3);
      color: var(--text-primary);
    }

    .error-desc {
      color: var(--text-secondary);
      font-size: var(--fs-md);
      margin-bottom: var(--space-8);
      line-height: var(--lh-relaxed);
    }

    .error-actions {
      display: flex;
      flex-direction: column;
      sm-flex-direction: row;
      gap: var(--space-3);
      justify-content: center;
    }

    @media (min-width: 640px) {
      .error-actions {
        flex-direction: row;
      }
    }
  </style>
</head>

<body>
  <div class="error-page">
    <canvas id="error-canvas"
      style="position: absolute; inset: 0; z-index: -1; pointer-events: none; opacity: 0.65;"></canvas>
    <div class="error-bg"></div>

    <div class="error-card">
      <div class="error-code">404</div>
      <h1 class="error-title">Oops! Page Not Found</h1>
      <p class="error-desc">
        The resource or page you are trying to access has been moved, deleted, or does not exist on our server.
      </p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">
          Go to Homepage
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </a>
        <a id="actionButton" class="btn btn-outline" href="#" onclick="history.back(); return false;">
          Go Back
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loggedIn = localStorage.getItem('userLoggedIn') === 'true';
      const role = localStorage.getItem('userRole');
      const actionButton = document.getElementById('actionButton');

      if (loggedIn && role) {
        // Change "Go Back" to "Back to Dashboard"
        actionButton.href = `${role}/dashboard.html`;
        actionButton.removeAttribute('onclick');
        actionButton.innerHTML = `
          Back to Dashboard
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9"></rect>
            <rect x="14" y="3" width="7" height="5"></rect>
            <rect x="14" y="12" width="7" height="9"></rect>
            <rect x="3" y="16" width="7" height="5"></rect>
          </svg>
        `;
      } else {
        // Hide the "Go Back" button completely
        actionButton.style.display = 'none';
      }

      // Initialize Interactive Particle Network
      initParticles();
    });

    function initParticles() {
      const canvas = document.getElementById('error-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      const particles = [];
      const maxParticles = 60;

      class Particle {
        constructor() {
          this.reset();
          this.x = Math.random() * width;
          this.y = Math.random() * height;
        }

        reset() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 1.2;
          this.vy = (Math.random() - 0.5) * 1.2;
          this.radius = Math.random() * 2 + 1;
          this.color = Math.random() > 0.5 ? 'rgba(0, 102, 255, 0.45)' : 'rgba(0, 230, 230, 0.45)';
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
      }

      for (let i = 0; i < maxParticles; i++) {
        particles.push(new Particle());
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);

        // Draw connection lines
        for (let i = 0; i < maxParticles; i++) {
          for (let j = i + 1; j < maxParticles; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(0, 102, 255, ${0.15 * (1 - dist / 120)})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
        }

        particles.forEach(p => {
          p.update();
          p.draw();
        });

        requestAnimationFrame(animate);
      }
      animate();
    }
  </script>
</body>

</html>
