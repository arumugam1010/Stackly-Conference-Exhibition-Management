<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to Stackly - Access your dashboard, registered events, and more.">
  <title>Login - Stackly</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%230066ff'/%3E%3Cstop offset='100%25' style='stop-color:%2300e6e6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Cpath d='M30 35h40v5H30zm0 12h40v5H30zm0 12h30v5H30z' fill='white'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .auth-bg {
      position: absolute;
      inset: 0;
      background: var(--gradient-mesh);
      z-index: -1;
    }

    .auth-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }

    .auth-form-container {
      width: 100%;
      max-width: 440px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    .auth-logo-icon {
      width: 48px;
      height: 48px;
      background: var(--gradient-primary);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-logo-text {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-bold);
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-2xl);
      padding: var(--space-8);
      animation: fadeInUp 0.6s ease;
    }

    .auth-title {
      font-size: var(--fs-3xl);
      font-weight: var(--fw-bold);
      margin-bottom: var(--space-2);
    }

    .auth-subtitle {
      color: var(--text-secondary);
      margin-bottom: var(--space-6);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-6) 0;
      color: var(--text-muted);
      font-size: var(--fs-sm);
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-primary);
    }

    .auth-social {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }

    .auth-social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3);
      background: var(--bg-glass);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      color: var(--text-secondary);
      font-size: var(--fs-sm);
      transition: all var(--transition-fast);
    }

    .auth-social-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      border-color: var(--primary-500);
    }

    .auth-illustration {
      display: none;
      flex: 1;
      background-image: linear-gradient(135deg, rgba(7, 7, 10, 0.75), rgba(7, 7, 10, 0.8)), url('assets/auth_bg.webp');
      background-size: cover;
      background-position: center;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    @media (min-width: 1024px) {
      .auth-illustration {
        display: flex;
      }
    }

    .auth-illustration-content {
      text-align: center;
      padding: var(--space-8);
      max-width: 500px;
    }

    .auth-3d {
      width: 300px;
      height: 300px;
      position: relative;
      margin: 0 auto var(--space-6);
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="auth-bg"></div>

    <div class="auth-panel">
      <div class="auth-form-container">
        <div class="auth-card">
          <!-- Logo inside card -->
          <a href="index.html" class="auth-logo"
            style="display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: var(--space-6);">
            <img src="assets/logo-stackly.webp" alt="Stackly Logo" class="auth-logo-img"
              style="height: 40px; width: auto; border-radius: 6px; filter: brightness(0) saturate(100%) invert(32%) sepia(86%) saturate(2987%) hue-rotate(210deg) brightness(98%) contrast(107%);">
          </a>

          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to access your events and dashboard.</p>




          <form data-validate novalidate onsubmit="handleLogin(event)">
            <div class="role-selector">
              <button type="button" class="role-tab active" data-role="attendee"
                onclick="selectRole('attendee')">Attendee</button>
              <button type="button" class="role-tab" data-role="organizer"
                onclick="selectRole('organizer')">Organizer</button>
              <button type="button" class="role-tab" data-role="admin" onclick="selectRole('admin')">Admin</button>
            </div>
            <input type="hidden" id="selectedRole" value="attendee">

            <div class="form-group">
              <label class="form-label" for="email">Email Address</label>
              <input type="email" id="email" class="form-input" placeholder="Enter email address" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <div class="password-input-wrapper">
                <input type="password" id="password" class="form-input"
                  placeholder="Enter password (min 8 chars, A-z, symbol)" required>
                <button type="button" class="password-toggle-btn" onclick="togglePassword('password', this)"
                  aria-label="Toggle Password Visibility">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="auth-options">
              <label class="checkbox-animated">
                <input type="checkbox">
                <span class="text-sm text-secondary">Remember me</span>
              </label>
              <a href="404.html" class="text-sm" style="color: var(--primary-400);">Forgot password?</a>
            </div>

            <div id="loginError"
              style="display: none; color: #ff4d4d; font-size: var(--fs-sm); margin-bottom: var(--space-4); background: rgba(255, 77, 77, 0.1); padding: var(--space-3); border-radius: var(--radius-md); border: 1px solid rgba(255, 77, 77, 0.2); line-height: 1.4;">
            </div>

            <button type="submit" class="btn btn-primary w-full btn-lg">
              Sign In
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </form>

          <div class="text-center mt-6">
            <span class="text-secondary text-sm">Don't have an account?</span>
            <a href="register.html" class="text-sm font-medium"
              style="color: var(--primary-400); margin-left: var(--space-2);">Create account</a>
          </div>

          <div class="text-center mt-4">
            <a href="index.html"
              style="color: var(--text-muted); font-size: var(--fs-sm); display: inline-flex; align-items: center; gap: 8px; text-decoration: none; transition: color var(--transition-fast);"
              onmouseover="this.style.color='var(--primary-400)'" onmouseout="this.style.color='var(--text-muted)'">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
              Back to Home
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script>
    function togglePassword(inputId, btnEl) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      if (btnEl) {
        if (isPassword) {
          btnEl.innerHTML = `
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          `;
        } else {
          btnEl.innerHTML = `
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          `;
        }
      }
    }

    function selectRole(role) {
      document.getElementById('selectedRole').value = role;
      const tabs = document.querySelectorAll('.role-tab');
      tabs.forEach(tab => {
        if (tab.getAttribute('data-role') === role) {
          tab.classList.add('active');
        } else {
          tab.classList.remove('active');
        }
      });
    }

    // Clear session on login page load
    document.addEventListener('DOMContentLoaded', () => {
      localStorage.removeItem('userRole');
      localStorage.removeItem('userLoggedIn');
    });

    function handleLogin(e) {
      e.preventDefault();
      const emailEl = document.getElementById('email');
      const passwordEl = document.getElementById('password');
      const email = emailEl.value;
      const password = passwordEl.value;
      const role = document.getElementById('selectedRole').value;
      const errorEl = document.getElementById('loginError');

      // Reset display and border styles
      errorEl.style.display = 'none';
      errorEl.textContent = '';
      emailEl.style.borderColor = '';
      passwordEl.style.borderColor = '';

      // Email validation
      if (!email) {
        errorEl.textContent = 'Please enter your email address.';
        errorEl.style.display = 'block';
        emailEl.style.borderColor = '#ff3333';
        emailEl.focus();
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        errorEl.style.display = 'block';
        emailEl.style.borderColor = '#ff3333';
        emailEl.focus();
        return;
      }

      // Password validation
      if (!password) {
        errorEl.textContent = 'Please enter your password.';
        errorEl.style.display = 'block';
        passwordEl.style.borderColor = '#ff3333';
        passwordEl.focus();
        return;
      }

      const hasLength = password.length >= 8;
      const hasUppercase = /[A-Z]/.test(password);
      const hasLowercase = /[a-z]/.test(password);
      const hasSymbol = /[^A-Za-z0-9]/.test(password);

      if (!hasLength || !hasUppercase || !hasLowercase || !hasSymbol) {
        errorEl.textContent = 'Password must be at least 8 characters long and include an uppercase letter, a lowercase letter, and a symbol.';
        errorEl.style.display = 'block';
        passwordEl.style.borderColor = '#ff3333';
        passwordEl.focus();
        return;
      }

      // Save user session in localStorage
      localStorage.setItem('userRole', role);
      localStorage.setItem('userLoggedIn', 'true');

      // Redirect directly to the dashboard of the selected role
      window.location.href = `${role}/dashboard.html`;
    }
  </script>
</body>

</html>
