<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register for Stackly - Create your account and start exploring events.">
  <title>Register - Stackly</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%230066ff'/%3E%3Cstop offset='100%25' style='stop-color:%2300e6e6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Cpath d='M30 35h40v5H30zm0 12h40v5H30zm0 12h30v5H30z' fill='white'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .auth-bg {
      position: absolute;
      inset: 0;
      background: var(--gradient-mesh);
      z-index: -1;
    }

    .auth-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }

    .auth-form-container {
      width: 100%;
      max-width: 500px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    .auth-logo-icon {
      width: 48px;
      height: 48px;
      background: var(--gradient-primary);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-logo-text {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-bold);
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-2xl);
      padding: var(--space-8);
      animation: fadeInUp 0.6s ease;
    }

    .auth-title {
      font-size: var(--fs-3xl);
      font-weight: var(--fw-bold);
      margin-bottom: var(--space-2);
    }

    .auth-subtitle {
      color: var(--text-secondary);
      margin-bottom: var(--space-6);
    }

    .role-selection {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }

    @media (min-width: 480px) {
      .role-selection {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .role-card {
      position: relative;
      padding: var(--space-4);
      background: var(--bg-glass);
      border: 2px solid var(--border-primary);
      border-radius: var(--radius-xl);
      cursor: pointer;
      text-align: center;
      transition: all var(--transition-fast);
    }

    .role-card:hover {
      border-color: var(--primary-500);
      transform: translateY(-2px);
    }

    .role-card.selected {
      border-color: var(--primary-500);
      background: rgba(0, 102, 255, 0.1);
    }

    .role-card input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .role-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto var(--space-2);
      background: var(--gradient-primary);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .role-title {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      margin-bottom: var(--space-1);
    }

    .role-desc {
      font-size: var(--fs-xs);
      color: var(--text-muted);
    }

    .role-card[data-role="organizer"] .role-icon {
      background: linear-gradient(135deg, #ff00a0, #cc0080);
    }

    .role-card[data-role="admin"] .role-icon {
      background: linear-gradient(135deg, #00ff7a, #00cc62);
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .step {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--bg-glass);
      border: 2px solid var(--border-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--fw-semibold);
      color: var(--text-muted);
      transition: all var(--transition-fast);
    }

    .step.active {
      background: var(--gradient-primary);
      border-color: transparent;
      color: white;
    }

    .step.completed {
      background: var(--success-500);
      border-color: transparent;
      color: white;
    }

    .step-line {
      flex: 1;
      max-width: 100px;
      height: 2px;
      background: var(--border-primary);
      margin-top: 19px;
    }

    .password-strength {
      display: flex;
      gap: var(--space-1);
      margin-top: var(--space-2);
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      background: var(--bg-glass);
      border-radius: var(--radius-full);
      transition: background var(--transition-fast);
    }

    .strength-bar.active {
      background: var(--error-500);
    }

    .strength-bar.active.medium {
      background: var(--warning-500);
    }

    .strength-bar.active.strong {
      background: var(--success-500);
    }

    .auth-illustration {
      display: none;
      flex: 1;
      background-image: linear-gradient(135deg, rgba(7, 7, 10, 0.75), rgba(7, 7, 10, 0.8)), url('assets/auth_bg.webp');
      background-size: cover;
      background-position: center;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    @media (min-width: 1024px) {
      .auth-illustration {
        display: flex;
      }
    }

    .auth-illustration-content {
      text-align: center;
      padding: var(--space-8);
      max-width: 500px;
    }

    .auth-3d {
      width: 300px;
      height: 300px;
      position: relative;
      margin: 0 auto var(--space-6);
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="auth-bg"></div>

    <div class="auth-panel">
      <div class="auth-form-container">
        <div class="auth-card">
          <!-- Logo inside card -->
          <a href="index.html" class="auth-logo"
            style="display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: var(--space-6);">
            <img src="assets/logo-stackly.webp" alt="Stackly Logo" class="auth-logo-img"
              style="height: 40px; width: auto; border-radius: 6px; filter: brightness(0) saturate(100%) invert(32%) sepia(86%) saturate(2987%) hue-rotate(210deg) brightness(98%) contrast(107%);">
          </a>

          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Join thousands of event professionals worldwide.</p>

          <!-- Step 1: Account Details & Role Selection -->
          <div id="stepOne">
            <form data-validate novalidate onsubmit="event.preventDefault(); completeRegistration();">
              <div class="form-group mb-5">
                <label class="form-label mb-3">I want to join as:</label>
                <div class="role-selection">
                  <label class="role-card selected" data-role="attendee">
                    <input type="radio" name="role" value="attendee" checked style="position: absolute; opacity: 0;">
                    <div class="role-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24"
                        height="24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                      </svg>
                    </div>
                    <div class="role-title">Attendee</div>
                    <div class="role-desc">Join events</div>
                  </label>

                  <label class="role-card" data-role="organizer">
                    <input type="radio" name="role" value="organizer" style="position: absolute; opacity: 0;">
                    <div class="role-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24"
                        height="24">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="9" y1="21" x2="9" y2="9"></line>
                      </svg>
                    </div>
                    <div class="role-title">Organizer</div>
                    <div class="role-desc">Host events</div>
                  </label>

                  <label class="role-card" data-role="admin">
                    <input type="radio" name="role" value="admin" style="position: absolute; opacity: 0;">
                    <div class="role-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24"
                        height="24">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                      </svg>
                    </div>
                    <div class="role-title">Admin</div>
                    <div class="role-desc">Full access</div>
                  </label>
                </div>
              </div>

              <div class="grid md:grid-cols-2 gap-4">
                <div class="form-group">
                  <label class="form-label" for="firstName">First Name</label>
                  <input type="text" id="firstName" class="form-input" placeholder="John" required pattern="[A-Za-z\s]+"
                    title="First name must only contain letters and spaces"
                    oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')">
                </div>
                <div class="form-group">
                  <label class="form-label" for="lastName">Last Name</label>
                  <input type="text" id="lastName" class="form-input" placeholder="Doe" required pattern="[A-Za-z\s]+"
                    title="Last name must only contain letters and spaces"
                    oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')">
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
              </div>

              <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-input-wrapper">
                  <input type="password" id="password" class="form-input" placeholder="Create a password" required
                    minlength="8" oninput="checkPasswordStrength(this.value)">
                  <button type="button" class="password-toggle-btn" onclick="togglePassword('password', this)"
                    aria-label="Toggle Password Visibility">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </div>
                <div class="password-strength">
                  <div class="strength-bar" id="str1"></div>
                  <div class="strength-bar" id="str2"></div>
                  <div class="strength-bar" id="str3"></div>
                  <div class="strength-bar" id="str4"></div>
                </div>
                <span class="text-xs text-muted mt-1" id="strengthText">Password strength: Weak</span>
              </div>

              <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <div class="password-input-wrapper">
                  <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password"
                    required data-match="password">
                  <button type="button" class="password-toggle-btn" onclick="togglePassword('confirmPassword', this)"
                    aria-label="Toggle Password Visibility">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </div>
              </div>

              <div id="registerError"
                style="display: none; color: #ff4d4d; font-size: var(--fs-sm); margin-top: var(--space-4); margin-bottom: var(--space-4); background: rgba(255, 77, 77, 0.1); padding: var(--space-3); border-radius: var(--radius-md); border: 1px solid rgba(255, 77, 77, 0.2); line-height: 1.4;">
              </div>

              <button type="submit" class="btn btn-primary w-full btn-lg mt-6">
                Create Account
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </button>
            </form>
          </div>

          <div class="text-center mt-6">
            <span class="text-secondary text-sm">Already have an account?</span>
            <a href="login.html" class="text-sm font-medium"
              style="color: var(--primary-400); margin-left: var(--space-2);">Sign in</a>
          </div>

          <div class="text-center mt-4">
            <a href="index.html"
              style="color: var(--text-muted); font-size: var(--fs-sm); display: inline-flex; align-items: center; gap: 8px; text-decoration: none; transition: color var(--transition-fast);"
              onmouseover="this.style.color='var(--primary-400)'" onmouseout="this.style.color='var(--text-muted)'">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
              Back to Home
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentStep = 1;
    let selectedRole = 'attendee';

    // Role selection
    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');

        // Check corresponding radio input
        const input = card.querySelector('input[type="radio"]');
        if (input) input.checked = true;

        selectedRole = card.dataset.role;
      });
    });

    function nextStep(step) {
      currentStep = step;

      // Update step indicators
      for (let i = 1; i <= 2; i++) {
        const stepEl = document.getElementById('step' + i);
        if (stepEl) {
          stepEl.classList.remove('active', 'completed');
          if (i < step) stepEl.classList.add('completed');
          else if (i === step) stepEl.classList.add('active');
        }
      }

      // Show correct form
      document.getElementById('stepOne').style.display = step === 1 ? 'block' : 'none';
      document.getElementById('stepTwo').style.display = step === 2 ? 'block' : 'none';

      if (step === 2) {
        document.getElementById('displayEmail').textContent = document.getElementById('email').value;
      }

      return false;
    }

    function checkPasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
      if (password.match(/\d/)) strength++;
      if (password.match(/[^a-zA-Z\d]/)) strength++;

      const bars = ['str1', 'str2', 'str3', 'str4'];
      const texts = ['Weak', 'Fair', 'Good', 'Strong'];
      const classes = ['', 'medium', 'strong', 'strong'];

      bars.forEach((id, i) => {
        const bar = document.getElementById(id);
        bar.classList.remove('active', 'medium', 'strong');
        if (i < strength) {
          bar.classList.add('active');
          if (classes[strength - 1]) bar.classList.add(classes[strength - 1]);
        }
      });

      document.getElementById('strengthText').textContent = 'Password strength: ' + (texts[strength - 1] || 'Weak');
    }

    function togglePassword(inputId, btnEl) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      if (btnEl) {
        if (isPassword) {
          btnEl.innerHTML = `
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          `;
        } else {
          btnEl.innerHTML = `
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          `;
        }
      }
    }

    function moveToNext(current, index) {
      const inputs = document.querySelectorAll('#stepThree input');
      if (current.value.length === 1 && index < inputs.length) {
        inputs[index].focus();
      }
    }

    function completeRegistration() {
      const firstNameEl = document.getElementById('firstName');
      const lastNameEl = document.getElementById('lastName');
      const emailEl = document.getElementById('email');
      const passwordEl = document.getElementById('password');
      const confirmPasswordEl = document.getElementById('confirmPassword');

      const firstName = firstNameEl.value;
      const lastName = lastNameEl.value;
      const email = emailEl.value;
      const password = passwordEl.value;
      const confirmPassword = confirmPasswordEl.value;
      const errorEl = document.getElementById('registerError');

      // Reset error and border styles
      errorEl.style.display = 'none';
      errorEl.textContent = '';
      firstNameEl.style.borderColor = '';
      lastNameEl.style.borderColor = '';
      emailEl.style.borderColor = '';
      passwordEl.style.borderColor = '';
      confirmPasswordEl.style.borderColor = '';

      // First & Last Name validation
      if (!firstName) {
        errorEl.textContent = 'Please enter your first name.';
        errorEl.style.display = 'block';
        firstNameEl.style.borderColor = '#ff3333';
        firstNameEl.focus();
        return;
      }
      if (!lastName) {
        errorEl.textContent = 'Please enter your last name.';
        errorEl.style.display = 'block';
        lastNameEl.style.borderColor = '#ff3333';
        lastNameEl.focus();
        return;
      }

      // Email validation
      if (!email) {
        errorEl.textContent = 'Please enter your email address.';
        errorEl.style.display = 'block';
        emailEl.style.borderColor = '#ff3333';
        emailEl.focus();
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        errorEl.style.display = 'block';
        emailEl.style.borderColor = '#ff3333';
        emailEl.focus();
        return;
      }

      // Password validation
      if (!password) {
        errorEl.textContent = 'Please enter a password.';
        errorEl.style.display = 'block';
        passwordEl.style.borderColor = '#ff3333';
        passwordEl.focus();
        return;
      }

      const hasLength = password.length >= 8;
      const hasUppercase = /[A-Z]/.test(password);
      const hasLowercase = /[a-z]/.test(password);
      const hasSymbol = /[^A-Za-z0-9]/.test(password);

      if (!hasLength || !hasUppercase || !hasLowercase || !hasSymbol) {
        errorEl.textContent = 'Password must be at least 8 characters long and include an uppercase letter, a lowercase letter, and a symbol.';
        errorEl.style.display = 'block';
        passwordEl.style.borderColor = '#ff3333';
        passwordEl.focus();
        return;
      }

      // Confirm Password match validation
      if (!confirmPassword) {
        errorEl.textContent = 'Please confirm your password.';
        errorEl.style.display = 'block';
        confirmPasswordEl.style.borderColor = '#ff3333';
        confirmPasswordEl.focus();
        return;
      }

      if (password !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        confirmPasswordEl.style.borderColor = '#ff3333';
        confirmPasswordEl.focus();
        return;
      }

      // Save user session in localStorage
      localStorage.setItem('userRole', selectedRole);
      localStorage.setItem('userLoggedIn', 'true');
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userFirstName', firstName);
      localStorage.setItem('userLastName', lastName);
      localStorage.setItem('userDisplayName', firstName + ' ' + lastName);

      // Save registration in a mock database so it persists across login/logout
      localStorage.setItem('reg_' + email.toLowerCase() + '_email', email);
      localStorage.setItem('reg_' + email.toLowerCase() + '_name', firstName + ' ' + lastName);

      // Simulate registration - redirect to appropriate dashboard
      window.location.href = selectedRole + '/dashboard.html';
    }
  </script>
</body>

</html>
